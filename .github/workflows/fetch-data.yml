name: Fetch Market Data

on:
  schedule:
    # Indian market hours + margin (5:30 AM IST - 11:30 PM IST = UTC 0-18) every 10 min, weekdays
    - cron: '*/10 0-18 * * 1-5'
    # US/overnight hours (11:30 PM IST - 5:30 AM IST = UTC 18-23 + 0) every 30 min, weekdays
    # Catches US market close (1:30 AM IST) and post-close updates
    - cron: '*/30 19-23 * * 1-5'
    # Weekends — hourly to capture US Friday close and Asian Sunday open
    - cron: '0 * * * 0,6'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 lxml yfinance

      - name: Run fetcher
        run: python scripts/fetch.py

      - name: Commit data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/snapshot.json data/news.json data/option_chain.json 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "data: refresh $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          fi
