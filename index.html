<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The Trade · Live</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,700;1,9..144,400;1,9..144,700&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:           #0a0e1a;
    --bg-elev:      #11162a;
    --bg-card:      #161b2c;
    --border:       rgba(255,255,255,0.06);
    --border-strong:rgba(255,255,255,0.12);
    --text:         #e8ecf5;
    --text-muted:   #8892a8;
    --text-dim:     #5a6178;
    --gold:         #fbbf24;
    --gold-soft:    rgba(251,191,36,0.12);
    --gold-border:  rgba(251,191,36,0.45);
    --green:        #4ade80;
    --green-soft:   rgba(74,222,128,0.15);
    --amber:        #fbbf24;
    --amber-soft:   rgba(251,191,36,0.15);
    --red:          #f87171;
    --red-soft:     rgba(248,113,113,0.15);

    --font-serif:   'Fraunces', Georgia, serif;
    --font-sans:    'DM Sans', system-ui, sans-serif;
    --font-mono:    'JetBrains Mono', ui-monospace, monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-sans);
    font-size: 15px;
    line-height: 1.5;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  .container {
    max-width: 900px;
    margin: 0 auto;
    padding: 48px 32px 80px;
  }

  /* ─── Header ─────────────────────────────────────────── */
  header.page-head {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 28px;
  }

  h1 {
    font-family: var(--font-serif);
    font-weight: 700;
    font-size: 56px;
    letter-spacing: -0.02em;
    line-height: 1;
  }
  h1 em {
    color: var(--gold);
    font-style: italic;
    font-weight: 400;
  }

  .clock {
    text-align: right;
    font-family: var(--font-mono);
  }
  .clock .time { font-size: 18px; font-weight: 600; letter-spacing: 0.02em; }
  .clock .live-badge {
    font-size: 11px;
    letter-spacing: 0.15em;
    margin-top: 4px;
    color: var(--red);
    transition: color 0.3s ease;
  }
  .clock .live-badge[data-state="ok"]    { color: var(--green); }
  .clock .live-badge[data-state="warn"]  { color: var(--amber); }
  .clock .live-badge[data-state="stale"] { color: var(--red); }
  .clock .live-badge::before {
    content: '●';
    display: inline-block;
    margin-right: 4px;
    animation: pulse 1.5s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50%      { opacity: 0.3; }
  }

  /* ─── Refresh card ───────────────────────────────────── */
  .refresh-card {
    border: 2px solid var(--gold-border);
    border-radius: 12px;
    padding: 20px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 24px;
    margin-bottom: 20px;
    background: linear-gradient(135deg, rgba(251,191,36,0.02), transparent);
  }
  .refresh-btn {
    background: var(--gold);
    color: #1a1505;
    border: none;
    padding: 14px 28px;
    border-radius: 8px;
    font-family: var(--font-mono);
    font-weight: 600;
    font-size: 13px;
    letter-spacing: 0.12em;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 10px;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }
  .refresh-btn:hover  { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(251,191,36,0.25); }
  .refresh-btn:active { transform: translateY(0); }
  .refresh-btn:disabled { opacity: 0.55; cursor: not-allowed; transform: none; box-shadow: none; }
  .refresh-btn .icon { display: inline-block; transition: transform 0.6s ease; }
  .refresh-btn.spinning .icon { transform: rotate(360deg); }

  .refresh-meta {
    font-family: var(--font-mono);
    font-size: 13px;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .refresh-meta strong { color: var(--text); font-weight: 600; }
  .age-pill {
    padding: 4px 10px;
    border-radius: 6px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.04em;
    background: var(--red-soft);
    color: var(--red);
    transition: background 0.3s ease, color 0.3s ease;
  }
  .age-pill[data-state="ok"]    { background: var(--green-soft); color: var(--green); }
  .age-pill[data-state="warn"]  { background: var(--amber-soft); color: var(--amber); }
  .age-pill[data-state="stale"] { background: var(--red-soft);   color: var(--red); }

  /* ─── Tab toggle ─────────────────────────────────────── */
  .tabs {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 6px;
    margin-bottom: 32px;
  }
  .tabs button {
    background: transparent;
    color: var(--text-dim);
    border: none;
    padding: 14px 12px;
    border-radius: 8px;
    font-family: var(--font-mono);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.12em;
    cursor: pointer;
    transition: all 0.2s ease;
  }
  .tabs button:hover { color: var(--text-muted); }
  .tabs button.active {
    background: var(--gold);
    color: #1a1505;
  }

  /* ─── Section wrapper ────────────────────────────────── */
  .section {
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    margin-bottom: 20px;
    background: var(--bg-elev);
  }
  .section-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 18px;
  }
  .section-head .title {
    font-family: var(--font-mono);
    font-size: 12px;
    letter-spacing: 0.14em;
    color: var(--text-muted);
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .section-head .title .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--red);
    animation: pulse 1.5s ease-in-out infinite;
  }
  .section-head .count {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.12em;
    color: var(--text-dim);
  }

  /* ─── Headlines ──────────────────────────────────────── */
  .headlines { display: flex; flex-direction: column; gap: 10px; }
  .headline {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    transition: border-color 0.2s ease, transform 0.2s ease;
    cursor: pointer;
  }
  .headline:hover {
    border-color: var(--border-strong);
    transform: translateX(2px);
  }
  .headline .title-line {
    color: var(--text);
    font-size: 15px;
    line-height: 1.4;
    margin-bottom: 6px;
  }
  .headline .source {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.08em;
    color: var(--text-dim);
    text-transform: uppercase;
  }
  .headline.is-new {
    animation: slideIn 0.4s ease-out;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ─── Events ─────────────────────────────────────────── */
  .events-head {
    font-family: var(--font-mono);
    font-size: 12px;
    letter-spacing: 0.14em;
    color: var(--text-muted);
    text-transform: uppercase;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .events-head .bolt { color: var(--gold); }

  .detection-card {
    border: 1px solid var(--gold-border);
    background: var(--gold-soft);
    border-radius: 10px;
    padding: 18px;
    margin-bottom: 16px;
  }
  .detection-card .head {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.14em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 14px;
  }
  .detection-row {
    display: flex;
    gap: 12px;
    align-items: flex-start;
    padding: 10px 0;
    border-bottom: 1px dashed rgba(251,191,36,0.15);
    font-size: 14px;
    line-height: 1.5;
  }
  .detection-row:last-of-type { border-bottom: none; }
  .detection-row .tag {
    background: rgba(251,191,36,0.2);
    color: var(--gold);
    padding: 3px 10px;
    border-radius: 5px;
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 600;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .detection-row .quote { color: var(--text); font-style: italic; }
  .detection-row .src   { color: var(--text-muted); }
  .detection-hint {
    margin-top: 12px;
    font-size: 12px;
    color: var(--text-dim);
    font-style: italic;
  }

  .flags {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .flag {
    background: var(--bg-card);
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 10px 14px;
    border-radius: 8px;
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    transition: all 0.18s ease;
  }
  .flag:hover { border-color: var(--border-strong); color: var(--text); }
  .flag.is-on {
    border-color: var(--gold-border);
    color: var(--gold);
    background: var(--gold-soft);
  }
  .flag .auto-chip {
    background: var(--gold);
    color: #1a1505;
    padding: 2px 6px;
    border-radius: 3px;
    font-size: 9px;
    letter-spacing: 0.08em;
  }

  /* ─── Build Trade footer card ────────────────────────── */
  .build-card {
    border: 2px solid var(--gold-border);
    border-radius: 12px;
    padding: 20px 24px;
    background: linear-gradient(135deg, rgba(251,191,36,0.04), transparent);
  }
  .build-card .label {
    font-family: var(--font-mono);
    font-size: 12px;
    letter-spacing: 0.14em;
    color: var(--gold);
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  /* ─── Scrollbar polish ───────────────────────────────── */
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

  /* ─── Small screens ──────────────────────────────────── */
  @media (max-width: 640px) {
    .container { padding: 28px 18px 60px; }
    h1 { font-size: 40px; }
    .refresh-card { flex-direction: column; align-items: stretch; gap: 14px; }
    .refresh-meta { justify-content: space-between; }
  }
</style>
</head>
<body>
  <div class="container">

    <!-- ─── Page header ─────────────────────────────────── -->
    <header class="page-head">
      <h1>The <em>Trade</em></h1>
      <div class="clock">
        <div class="time" id="clock-time">--:-- IST</div>
        <div class="live-badge" data-live-badge>LIVE</div>
      </div>
    </header>

    <!-- ─── Refresh card ────────────────────────────────── -->
    <section class="refresh-card">
      <button class="refresh-btn" id="refresh-btn" type="button">
        <span class="icon">↻</span> REFRESH
      </button>
      <div class="refresh-meta">
        Data: <strong data-last-time>--:--</strong>
        <span class="age-pill" data-age-badge>—</span>
      </div>
    </section>

    <!-- ─── Mode tabs ───────────────────────────────────── -->
    <nav class="tabs">
      <button type="button" data-mode="pre">PRE-MARKET · PLAN TOMORROW</button>
      <button type="button" data-mode="live" class="active">LIVE · TRADE TODAY</button>
    </nav>

    <!-- ─── Live headlines ──────────────────────────────── -->
    <section class="section">
      <div class="section-head">
        <div class="title"><span class="dot"></span> Live Headlines</div>
        <div class="count"><span id="headline-count">0</span> HEADLINES</div>
      </div>
      <div class="headlines" id="headlines-list"></div>
    </section>

    <!-- ─── Today's events ──────────────────────────────── -->
    <section class="section">
      <div class="events-head">
        <span class="bolt">⚡</span> Today's Events · Auto-suggested from News + Date
      </div>

      <div class="detection-card" id="detection-card">
        <div class="head">📰 Detected from News + Calendar</div>
        <div id="detection-rows"></div>
        <div class="detection-hint">Tap the flags below to apply. Detection is keyword-based, verify before acting.</div>
      </div>

      <div class="flags" id="flags-row">
        <button class="flag" data-flag="geo"    type="button">🌐 GEO ESCALATION <span class="auto-chip" data-auto-chip hidden>AUTO</span></button>
        <button class="flag" data-flag="rbi"    type="button">🏛️ RBI POLICY</button>
        <button class="flag" data-flag="fed"    type="button">🇺🇸 FED/FOMC</button>
        <button class="flag" data-flag="expiry" type="button">⏰ EXPIRY DAY <span class="auto-chip" data-auto-chip hidden>AUTO</span></button>
        <button class="flag" data-flag="budget" type="button">💰 BUDGET</button>
      </div>
    </section>

    <!-- ─── Build trade card ────────────────────────────── -->
    <section class="build-card">
      <div class="label">⚡ Live · Build Trade</div>
    </section>

  </div>

<script>
/* ════════════════════════════════════════════════════════════════
   THE TRADE · live refresh + freshness controller
   ════════════════════════════════════════════════════════════════ */

const CONFIG = {
  REFRESH_MS:     90_000,    // poll every 90s while tab visible
  FRESH_OK_MS:    120_000,   // <2 min  → green
  FRESH_WARN_MS:  600_000,   // 2–10 min → amber, beyond → red
  SPIN_MIN_MS:    600,       // minimum spinner duration so it feels real
};

/* ─── 1. DATA SOURCE ─────────────────────────────────────────────
   Replace fetchHeadlines() with your real source (RSS proxy, API,
   scrape endpoint, whatever). It must:
     • return an array of { title, source, url? }
     • resolve quickly (<10s) or reject
   The seeded pool below just lets the UI run standalone.
   ─────────────────────────────────────────────────────────────── */

const HEADLINE_POOL = [
  { title: "HSBC highlights two Indian 'forgotten gems' beyond the AI trade for up to 35% upside", source: "CNBC TV18" },
  { title: "Astral shares fall 7% after Q4 earnings miss street estimates across parameters", source: "CNBC TV18" },
  { title: "Iran's Tehran Stock Exchange re-opens after 80 days since the beginning of war with US", source: "CNBC TV18" },
  { title: "ONGC stock still offers 15% upside as crude stays elevated: JM Financial", source: "CNBC TV18" },
  { title: "Nifty IT plunges 2% as Accenture guidance spooks Indian outsourcers", source: "Moneycontrol" },
  { title: "RBI keeps repo unchanged at 6.25%, MPC stance turns 'neutral'", source: "Mint" },
  { title: "Reliance Jio adds 4.8M subscribers in April, retains top spot: TRAI", source: "ET Markets" },
  { title: "Adani Enterprises hits 52-week high on green hydrogen JV announcement", source: "Bloomberg Quint" },
  { title: "FII outflow continues for 9th straight session; DIIs absorb ₹3,200 cr", source: "CNBC TV18" },
  { title: "TCS, Infosys upgraded by Morgan Stanley on margin recovery thesis", source: "Reuters" },
  { title: "Gold crosses ₹98,000/10g as dollar weakens on softer US CPI print", source: "Bloomberg" },
  { title: "Maruti Suzuki Q4 net jumps 18% YoY, declares ₹125 dividend", source: "Mint" },
  { title: "L&T bags ₹15,000 cr defence order from MoD for advanced artillery", source: "Business Standard" },
  { title: "SEBI tightens F&O position limits ahead of weekly expiry routine review", source: "Moneycontrol" },
  { title: "Crude steady near $84 as OPEC+ signals supply discipline through Q3", source: "Reuters" },
  { title: "Bank Nifty volatility index drops to 14.2 ahead of weekly expiry", source: "ET Markets" },
  { title: "Zomato consolidates ₹250 levels as Blinkit GOV growth holds 80%+", source: "CNBC TV18" },
  { title: "Vedanta dividend cut sparks 5% selloff; analysts split on debt path", source: "Bloomberg Quint" },
  { title: "DLF launches Gurugram luxury project, ₹8,000 cr bookings on day one", source: "Mint" },
  { title: "Power Grid hits all-time high as transmission capex visibility improves", source: "ET Markets" },
];

async function fetchHeadlines() {
  // 🔧 REPLACE THIS BODY WITH YOUR REAL FETCH.
  //    Example using a CORS proxy + RSS:
  //
  //    const r = await fetch('https://your-proxy/cnbc-tv18-rss');
  //    const items = await r.json();
  //    return items.map(i => ({ title: i.title, source: 'CNBC TV18', url: i.link }));
  //
  // For now: shuffle the seeded pool to simulate fresh data.
  await new Promise(res => setTimeout(res, 400 + Math.random() * 600));
  const shuffled = [...HEADLINE_POOL].sort(() => Math.random() - 0.5);
  return shuffled.slice(0, 15);
}

/* ─── 2. EVENT DETECTION ─────────────────────────────────────────
   Keyword scan over headline titles → flags AUTO badge on matching
   flag buttons. Extend KEYWORDS to add categories.
   ─────────────────────────────────────────────────────────────── */

const KEYWORDS = {
  geo:    [/iran/i, /israel/i, /war/i, /attack/i, /strike/i, /escalation/i, /russia/i, /ukraine/i, /china taiwan/i],
  rbi:    [/\brbi\b/i, /repo rate/i, /\bmpc\b/i, /monetary policy/i],
  fed:    [/\bfed\b/i, /fomc/i, /powell/i, /us cpi/i, /us inflation/i],
  budget: [/budget/i, /sitharaman/i, /finance minister/i, /fiscal deficit/i],
};

function detectEvents(headlines) {
  const hits = { geo: [], rbi: [], fed: [], expiry: [], budget: [] };

  // Headline-driven detection
  for (const h of headlines) {
    for (const [key, patterns] of Object.entries(KEYWORDS)) {
      if (patterns.some(p => p.test(h.title))) hits[key].push(h);
    }
  }

  // Calendar-driven detection
  const today = new Date();
  if (today.getDay() === 2) {                                   // Tuesday → weekly Nifty/BN expiry
    hits.expiry.push({ title: 'Today is Tuesday — weekly Nifty/BN expiry', source: 'CALENDAR' });
  }

  return hits;
}

/* ─── 3. STATE ───────────────────────────────────────────────── */

const state = {
  headlines: [],
  lastFetchAt: 0,
  pollTimer: null,
  inFlight: false,
  flagsManual: new Set(),       // flags the user toggled by hand
  flagsAuto:   new Set(),       // flags auto-detected from data
};

/* ─── 4. RENDER ──────────────────────────────────────────────── */

function renderHeadlines(headlines, { animateNew = false } = {}) {
  const list = document.getElementById('headlines-list');
  const prevTitles = new Set([...list.querySelectorAll('.headline')].map(n => n.dataset.title));

  list.innerHTML = '';
  for (const h of headlines) {
    const card = document.createElement('article');
    card.className = 'headline';
    card.dataset.title = h.title;
    if (animateNew && !prevTitles.has(h.title)) card.classList.add('is-new');
    card.innerHTML = `
      <div class="title-line"></div>
      <div class="source"></div>
    `;
    card.querySelector('.title-line').textContent = h.title;
    card.querySelector('.source').textContent = h.source;
    if (h.url) card.addEventListener('click', () => window.open(h.url, '_blank', 'noopener'));
    list.appendChild(card);
  }
  document.getElementById('headline-count').textContent = headlines.length;
}

function renderDetection(hits) {
  const rows = document.getElementById('detection-rows');
  rows.innerHTML = '';

  const order = [
    { key: 'geo',    label: 'Geo Escalation' },
    { key: 'rbi',    label: 'RBI Policy' },
    { key: 'fed',    label: 'Fed/FOMC' },
    { key: 'budget', label: 'Budget' },
    { key: 'expiry', label: 'Expiry Day' },
  ];

  let any = false;
  for (const { key, label } of order) {
    const items = hits[key];
    if (!items?.length) continue;
    any = true;
    const top = items[0];
    const row = document.createElement('div');
    row.className = 'detection-row';
    const tagText = items.length > 1 ? `${label} ×${items.length}` : label;
    row.innerHTML = `
      <span class="tag"></span>
      <span class="${top.source === 'CALENDAR' ? '' : 'quote'}"></span>
    `;
    row.querySelector('.tag').textContent = tagText;
    const body = row.querySelector('span:last-child');
    if (top.source === 'CALENDAR') {
      body.textContent = top.title;
    } else {
      body.innerHTML = '';
      const q = document.createElement('span');
      q.className = 'quote';
      q.textContent = `"${top.title}"`;
      const s = document.createElement('span');
      s.className = 'src';
      s.textContent = ` · ${top.source}`;
      body.appendChild(q);
      body.appendChild(s);
    }
    rows.appendChild(row);
  }

  document.getElementById('detection-card').style.display = any ? '' : 'none';
}

function renderFlags(hits) {
  state.flagsAuto = new Set(Object.entries(hits).filter(([, v]) => v.length).map(([k]) => k));

  document.querySelectorAll('.flag').forEach(btn => {
    const key  = btn.dataset.flag;
    const auto = state.flagsAuto.has(key);
    const on   = auto || state.flagsManual.has(key);
    btn.classList.toggle('is-on', on);

    const chip = btn.querySelector('[data-auto-chip]');
    if (chip) chip.hidden = !auto;
  });
}

/* ─── 5. FRESHNESS PAINT ─────────────────────────────────────── */

function paintFreshness() {
  const ageMs   = Date.now() - state.lastFetchAt;
  const minutes = Math.floor(ageMs / 60_000);
  const label   = state.lastFetchAt === 0 ? '—'
                : minutes < 1             ? 'just now'
                                          : `${minutes}m old`;

  let s = 'ok';
  if (state.lastFetchAt === 0)        s = 'stale';
  else if (ageMs > CONFIG.FRESH_WARN_MS) s = 'stale';
  else if (ageMs > CONFIG.FRESH_OK_MS)   s = 'warn';

  const liveBadge = document.querySelector('[data-live-badge]');
  const ageBadge  = document.querySelector('[data-age-badge]');
  if (liveBadge) liveBadge.dataset.state = s;
  if (ageBadge)  { ageBadge.textContent = label; ageBadge.dataset.state = s; }
}

function paintClock() {
  const now  = new Date();
  const hh   = String(now.getHours()).padStart(2, '0');
  const mm   = String(now.getMinutes()).padStart(2, '0');
  document.getElementById('clock-time').textContent = `${hh}:${mm} IST`;
}

function paintLastFetch() {
  if (state.lastFetchAt === 0) return;
  const d  = new Date(state.lastFetchAt);
  const hh = String(d.getHours()).padStart(2, '0');
  const mm = String(d.getMinutes()).padStart(2, '0');
  document.querySelector('[data-last-time]').textContent = `${hh}:${mm}`;
}

/* ─── 6. REFRESH ─────────────────────────────────────────────── */

async function doRefresh({ manual = false } = {}) {
  if (state.inFlight) return;
  state.inFlight = true;

  const btn = document.getElementById('refresh-btn');
  btn.classList.add('spinning');
  if (manual) btn.disabled = true;

  const startedAt = Date.now();
  try {
    const headlines = await fetchHeadlines();
    state.headlines   = headlines;
    state.lastFetchAt = Date.now();

    const hits = detectEvents(headlines);
    renderHeadlines(headlines, { animateNew: state.lastFetchAt > 0 });
    renderDetection(hits);
    renderFlags(hits);
    paintLastFetch();
    paintFreshness();
  } catch (err) {
    console.warn('[the-trade] refresh failed', err);
  } finally {
    // Hold the spinner at least SPIN_MIN_MS so users feel the action
    const elapsed   = Date.now() - startedAt;
    const remaining = Math.max(0, CONFIG.SPIN_MIN_MS - elapsed);
    setTimeout(() => {
      btn.classList.remove('spinning');
      btn.disabled = false;
      state.inFlight = false;
    }, remaining);
  }
}

/* ─── 7. POLLING + VISIBILITY ────────────────────────────────── */

function startPolling() {
  stopPolling();
  state.pollTimer = setInterval(doRefresh, CONFIG.REFRESH_MS);
}
function stopPolling() {
  if (state.pollTimer) { clearInterval(state.pollTimer); state.pollTimer = null; }
}

document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') {
    // Tab came back to focus → immediate catch-up if data is stale-ish
    if (Date.now() - state.lastFetchAt > CONFIG.FRESH_OK_MS) doRefresh();
    startPolling();
  } else {
    stopPolling();
  }
});

/* ─── 8. WIRE UP CONTROLS ────────────────────────────────────── */

document.getElementById('refresh-btn').addEventListener('click', () => doRefresh({ manual: true }));

document.querySelectorAll('.tabs button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tabs button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    // Mode-specific behavior would branch here. For now this is cosmetic.
  });
});

document.querySelectorAll('.flag').forEach(btn => {
  btn.addEventListener('click', () => {
    const key = btn.dataset.flag;
    // Auto-flags stay on regardless of click; manual toggle is for non-auto flags.
    if (state.flagsAuto.has(key)) return;
    if (state.flagsManual.has(key)) state.flagsManual.delete(key);
    else                            state.flagsManual.add(key);
    btn.classList.toggle('is-on');
  });
});

/* ─── 9. BOOT ────────────────────────────────────────────────── */

paintClock();
paintFreshness();
setInterval(paintClock, 1000);
setInterval(paintFreshness, 1000);

startPolling();
doRefresh();
</script>
